global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["gateway:3001"]
        labels:
          service: "gateway"

  - job_name: "order-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["order-service:50051"]
        labels:
          service: "order-service"

  - job_name: "route-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["route-service:50052"]
        labels:
          service: "route-service"

  - job_name: "driver-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["driver-service:50053"]
        labels:
          service: "driver-service"

  - job_name: "analytics-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["analytics-service:50054"]
        labels:
          service: "analytics-service"
