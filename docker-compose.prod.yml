version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: synapseroute-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - synapseroute-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: synapseroute-redis-prod
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - synapseroute-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: synapseroute-frontend-prod
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - NEXT_PUBLIC_MAP_PROVIDER=${NEXT_PUBLIC_MAP_PROVIDER:-leaflet}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - synapseroute-prod
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phoenix Backend (Elixir)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - MIX_ENV=prod
    container_name: synapseroute-backend-prod
    environment:
      - MIX_ENV=prod
      - PHX_SERVER=true
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PORT=4000
      - ML_SERVICE_URL=http://ml-service:8001
      - ROUTING_ML_SERVICE_URL=http://routing-ml-service:8002
      - POOL_SIZE=${POOL_SIZE:-10}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    networks:
      - synapseroute-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
      routing-ml-service:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ML Service (Python - Failure Prediction)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: synapseroute-ml-service-prod
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=production
      - MODEL_PATH=/app/models
      - LOG_LEVEL=info
      - WORKERS=${ML_WORKERS:-4}
    ports:
      - "${ML_SERVICE_PORT:-8001}:8001"
    volumes:
      - ml_models:/app/models:ro
    networks:
      - synapseroute-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Routing ML Microservice (Python/FastAPI)
  routing-ml-service:
    build:
      context: ./routing-ml-service
      dockerfile: Dockerfile
    container_name: synapseroute-routing-ml-prod
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=production
      - MODEL_PATH=/app/models
      - LOG_LEVEL=info
      - CACHE_ENABLED=true
      - REDIS_URL=redis://redis:6379
      - WORKERS=${ROUTING_ML_WORKERS:-4}
    ports:
      - "${ROUTING_ML_SERVICE_PORT:-8002}:8002"
    volumes:
      - routing_ml_models:/app/models:ro
    networks:
      - synapseroute-prod
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: synapseroute-prometheus-prod
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_prod_data:/prometheus
    networks:
      - synapseroute-prod
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Grafana (Observability Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: synapseroute-grafana-prod
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
      - GF_INSTALL_PLUGINS=
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - synapseroute-prod
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # NGINX Reverse Proxy (Optional - for production load balancing)
  nginx:
    image: nginx:alpine
    container_name: synapseroute-nginx-prod
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - synapseroute-prod
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  synapseroute-prod:
    driver: bridge
    name: synapseroute-prod

volumes:
  postgres_prod_data:
    name: synapseroute-postgres-prod-data
  redis_prod_data:
    name: synapseroute-redis-prod-data
  ml_models:
    name: synapseroute-ml-models-prod
  routing_ml_models:
    name: synapseroute-routing-ml-models-prod
  prometheus_prod_data:
    name: synapseroute-prometheus-prod-data
  grafana_prod_data:
    name: synapseroute-grafana-prod-data
