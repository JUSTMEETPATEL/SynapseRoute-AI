version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: synapseroute-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synapseroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-synapseroute_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - synapseroute-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapseroute}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: synapseroute-redis-dev
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - synapseroute-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: synapseroute-frontend-dev
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
      - NEXT_PUBLIC_MAP_PROVIDER=${NEXT_PUBLIC_MAP_PROVIDER:-leaflet}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - synapseroute-dev
    depends_on:
      - backend
    command: npm run dev

  # Phoenix Backend (Elixir)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: synapseroute-backend-dev
    environment:
      - MIX_ENV=dev
      - PHX_SERVER=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-synapseroute}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-synapseroute_dev}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-dev_secret_key_base_change_in_production}
      - PORT=4000
      - ML_SERVICE_URL=http://ml-service:8001
      - ROUTING_ML_SERVICE_URL=http://routing-ml-service:8002
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend:/app
      - backend_build_dev:/app/_build
      - backend_deps_dev:/app/deps
    networks:
      - synapseroute-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_started
      routing-ml-service:
        condition: service_started
    command: mix phx.server

  # ML Service (Python - Failure Prediction)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile.dev
    container_name: synapseroute-ml-service-dev
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=development
      - MODEL_PATH=/app/models
      - LOG_LEVEL=debug
    ports:
      - "${ML_SERVICE_PORT:-8001}:8001"
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models
    networks:
      - synapseroute-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # Routing ML Microservice (Python/FastAPI)
  routing-ml-service:
    build:
      context: ./routing-ml-service
      dockerfile: Dockerfile.dev
    container_name: synapseroute-routing-ml-dev
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=development
      - MODEL_PATH=/app/models
      - LOG_LEVEL=debug
      - CACHE_ENABLED=true
      - REDIS_URL=redis://redis:6379
    ports:
      - "${ROUTING_ML_SERVICE_PORT:-8002}:8002"
    volumes:
      - ./routing-ml-service:/app
      - routing_ml_models:/app/models
    networks:
      - synapseroute-dev
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: synapseroute-prometheus-dev
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml
      - prometheus_dev_data:/prometheus
    networks:
      - synapseroute-dev
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana (Observability Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: synapseroute-grafana-dev
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_dev_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - synapseroute-dev
    depends_on:
      - prometheus

networks:
  synapseroute-dev:
    driver: bridge
    name: synapseroute-dev

volumes:
  postgres_dev_data:
    name: synapseroute-postgres-dev-data
  redis_dev_data:
    name: synapseroute-redis-dev-data
  backend_build_dev:
    name: synapseroute-backend-build-dev
  backend_deps_dev:
    name: synapseroute-backend-deps-dev
  ml_models:
    name: synapseroute-ml-models
  routing_ml_models:
    name: synapseroute-routing-ml-models
  prometheus_dev_data:
    name: synapseroute-prometheus-dev-data
  grafana_dev_data:
    name: synapseroute-grafana-dev-data
